# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: curlycatclaw

before:
  hooks:
    - go mod verify

builds:
  - id: curlycatclaw
    main: ./cmd/curlycatclaw
    binary: curlycatclaw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    formats:
      - tar.gz
    files:
      - LICENSE*
      - README.md
      - config.toml.example
      - deploy/curlycatclaw.service

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: jialuohu
    name: curlycatclaw
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"
