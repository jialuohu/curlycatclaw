# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: curlycatclaw

before:
  hooks:
    - go mod verify

builds:
  - id: curlycatclaw
    main: ./cmd/curlycatclaw
    binary: curlycatclaw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: curlycatclaw-gws-mcp
    main: ./cmd/curlycatclaw-gws-mcp
    binary: curlycatclaw-gws-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: curlycatclaw-updater
    main: ./cmd/curlycatclaw-updater
    binary: curlycatclaw-updater
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    builds: [curlycatclaw, curlycatclaw-gws-mcp, curlycatclaw-updater]
    formats:
      - tar.gz
    files:
      - LICENSE*
      - README.md
      - config.toml.example

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers:
  - id: curlycatclaw
    ids: [curlycatclaw, curlycatclaw-gws-mcp]
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/jialuohu/curlycatclaw:{{ .Version }}"
      - "ghcr.io/jialuohu/curlycatclaw:{{ .Major }}.{{ .Minor }}"
      - "ghcr.io/jialuohu/curlycatclaw:latest"
    extra_files:
      - config.toml.example

  - id: curlycatclaw-updater
    ids: [curlycatclaw-updater]
    dockerfile: Dockerfile.goreleaser-updater
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/jialuohu/curlycatclaw-updater:{{ .Version }}"
      - "ghcr.io/jialuohu/curlycatclaw-updater:{{ .Major }}.{{ .Minor }}"
      - "ghcr.io/jialuohu/curlycatclaw-updater:latest"

release:
  github:
    owner: jialuohu
    name: curlycatclaw
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"
