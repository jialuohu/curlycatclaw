# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: curlycatclaw

before:
  hooks:
    - go mod verify

builds:
  - id: curlycatclaw
    main: ./cmd/curlycatclaw
    binary: curlycatclaw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    formats:
      - tar.gz
    files:
      - LICENSE*
      - README.md
      - config.toml.example

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers:
  - id: curlycatclaw
    ids: [curlycatclaw]
    dockerfile: Dockerfile.goreleaser
    images:
      - "ghcr.io/jialuohu/curlycatclaw"
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    extra_files:
      - config.toml.example

brews:
  - repository:
      owner: jialuohu
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    name: curlycatclaw
    homepage: "https://github.com/jialuohu/curlycatclaw"
    description: "Personal AI agent assistant daemon"
    license: "MIT"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    install: |
      bin.install "curlycatclaw"
    test: |
      system "#{bin}/curlycatclaw", "--version"

release:
  github:
    owner: jialuohu
    name: curlycatclaw
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"
