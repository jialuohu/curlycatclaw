# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: curlycatclaw

before:
  hooks:
    - go mod verify

builds:
  - id: curlycatclaw
    main: ./cmd/curlycatclaw
    binary: curlycatclaw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    formats:
      - tar.gz
    files:
      - LICENSE*
      - README.md
      - config.toml.example
      - deploy/curlycatclaw.service

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers_v2:
  - id: curlycatclaw
    ids: [curlycatclaw]
    dockerfile: Dockerfile.goreleaser
    images:
      - "ghcr.io/jialuohu/curlycatclaw"
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    extra_files:
      - config.toml.example

# Homebrew tap (uncomment after creating jialuohu/homebrew-tap repo
# and adding HOMEBREW_TAP_GITHUB_TOKEN secret):
#
# homebrew_casks:
#   - name: curlycatclaw
#     ids: [default]
#     repository:
#       owner: jialuohu
#       name: homebrew-tap
#       token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
#     homepage: "https://github.com/jialuohu/curlycatclaw"
#     description: "Personal AI agent assistant daemon"

release:
  github:
    owner: jialuohu
    name: curlycatclaw
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"
