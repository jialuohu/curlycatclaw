# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: curlycatclaw

before:
  hooks:
    - go mod verify

builds:
  - id: curlycatclaw
    main: ./cmd/curlycatclaw
    binary: curlycatclaw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    formats:
      - tar.gz
    files:
      - LICENSE*
      - README.md
      - config.toml.example

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers:
  - id: curlycatclaw-amd64
    ids: [curlycatclaw]
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/jialuohu/curlycatclaw:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
    extra_files:
      - config.toml.example
  - id: curlycatclaw-arm64
    ids: [curlycatclaw]
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/jialuohu/curlycatclaw:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
    extra_files:
      - config.toml.example

docker_manifests:
  - name_template: "ghcr.io/jialuohu/curlycatclaw:{{ .Version }}"
    image_templates:
      - "ghcr.io/jialuohu/curlycatclaw:{{ .Version }}-amd64"
      - "ghcr.io/jialuohu/curlycatclaw:{{ .Version }}-arm64"
  - name_template: "ghcr.io/jialuohu/curlycatclaw:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/jialuohu/curlycatclaw:{{ .Version }}-amd64"
      - "ghcr.io/jialuohu/curlycatclaw:{{ .Version }}-arm64"
  - name_template: "ghcr.io/jialuohu/curlycatclaw:latest"
    image_templates:
      - "ghcr.io/jialuohu/curlycatclaw:{{ .Version }}-amd64"
      - "ghcr.io/jialuohu/curlycatclaw:{{ .Version }}-arm64"

brews:
  - repository:
      owner: jialuohu
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    name: curlycatclaw
    homepage: "https://github.com/jialuohu/curlycatclaw"
    description: "Personal AI agent assistant daemon"
    license: "MIT"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    install: |
      bin.install "curlycatclaw"
    test: |
      system "#{bin}/curlycatclaw", "--version"

release:
  github:
    owner: jialuohu
    name: curlycatclaw
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"
