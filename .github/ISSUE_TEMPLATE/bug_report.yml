name: Bug Report
description: Report something that isn't working correctly
labels: ["bug", "alpha"]
assignees: ["jialuohu"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Send message "..."
        2. Wait for response
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Version, deployment method, OS (the bot can auto-fill this)"
      placeholder: |
        Version: v0.31.5
        Deployment: Docker / binary
        OS: Ubuntu 24.04
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - Major
        - Minor
        - Cosmetic
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Paste screenshots or links if applicable.
    validations:
      required: false
