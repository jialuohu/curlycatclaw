name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v6.5.0
        with:
          version: v2.11

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Known MCP SDK v0.8.0 vulns (fixed in v1.4.1, upgrade blocked on API changes):
          # GO-2026-4773: Cross-site tool execution (we use stdio, not HTTP — unexploitable)
          # GO-2026-4770: Null Unicode in JSON parsing (MCP SDK internal, low risk)
          # Fail on any NEW vuln not in this list.
          govulncheck ./... 2>&1 | tee /tmp/vulncheck.out || true
          if grep -q "Vulnerability #" /tmp/vulncheck.out; then
            UNKNOWN=$(grep "Vulnerability #" /tmp/vulncheck.out | grep -v -E "GO-2026-4773|GO-2026-4770" || true)
            if [ -n "$UNKNOWN" ]; then
              echo "::error::New vulnerability found (not in known-accept list)"
              cat /tmp/vulncheck.out
              exit 1
            fi
            echo "Only known-accepted MCP SDK vulnerabilities found"
          fi

      - name: Test
        run: go test ./... -count=1 -race
