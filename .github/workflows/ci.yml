name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v6.5.0
        with:
          version: v2.11

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # GO-2026-4773: MCP SDK v0.8.0 has a cross-site tool execution vuln
          # fixed in v1.4.1. We use stdio transport (not HTTP), so this is
          # unexploitable in our usage. Upgrade blocked on SDK API changes.
          # Fail on any NEW vuln, allow only this known one.
          govulncheck ./... 2>&1 | tee /tmp/vulncheck.out || true
          if grep -q "Vulnerability #" /tmp/vulncheck.out; then
            # Check if ALL findings are the known MCP SDK vuln.
            UNKNOWN=$(grep "Vulnerability #" /tmp/vulncheck.out | grep -v "GO-2026-4773" || true)
            if [ -n "$UNKNOWN" ]; then
              echo "::error::New vulnerability found (not in known-accept list)"
              cat /tmp/vulncheck.out
              exit 1
            fi
            echo "Only known-accepted vulnerabilities found (GO-2026-4773)"
          fi

      - name: Test
        run: go test ./... -count=1 -race
