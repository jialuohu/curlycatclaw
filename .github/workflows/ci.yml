name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v6.5.0
        with:
          version: v2.11

      - name: Vulnerability check
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # govulncheck reports all vulns including Go stdlib (needs Go version bump)
          # and MCP SDK (upgrade blocked on API changes). Run for visibility but
          # don't block CI — stdlib vulns require coordinated Go version upgrade,
          # MCP SDK vulns are low-risk for our stdio transport usage.
          govulncheck ./...

      - name: Test
        run: go test ./... -count=1 -race
