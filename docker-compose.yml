services:
  curlycatclaw:
    build: .
    restart: unless-stopped
    volumes:
      - ~/.curlycatclaw:/data
    env_file:
      - path: ~/.curlycatclaw/env
        required: false
    environment:
      - CURLYCATCLAW_DB_PATH=/data/curlycatclaw.db
      - CURLYCATCLAW_QDRANT_ADDR=qdrant:6334
      - CURLYCATCLAW_ISOLATED_HOME=/data/claude-home
      - CURLYCATCLAW_OLLAMA_URL=http://ollama:11434
      - HOME=/data
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.14.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 3s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  qdrant-data:
  ollama-data:
