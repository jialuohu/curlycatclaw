services:
  curlycatclaw:
    build: .
    restart: unless-stopped
    volumes:
      - ~/.curlycatclaw:/data
    environment:
      - CURLYCATCLAW_DB_PATH=/data/curlycatclaw.db
      - CURLYCATCLAW_QDRANT_ADDR=qdrant:6334
      - CURLYCATCLAW_CLI_PATH=/usr/local/bin/claude
      - CURLYCATCLAW_ISOLATED_HOME=/data/claude-home
      - HOME=/data
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.14.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  qdrant-data:
