services:
  curlycatclaw:
    image: ${CURLYCATCLAW_IMAGE:-ghcr.io/jialuohu/curlycatclaw:latest}
    command: ["--config", "/data/config.toml"]
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    stop_grace_period: 45s  # Must exceed SuperviseAll drain timeout (30s) + CLI shutdown (30s)
    volumes:
      - ~/.curlycatclaw:/data
    environment:
      - HOME=/data
      # UPDATER_SECRET and CURLYCATCLAW_MASTER_KEY are read from .env via ${}
      # substitution (not env_file) so they work both on the host and when the
      # sidecar recreates this container.
      - UPDATER_SECRET=${UPDATER_SECRET:-}
      - CURLYCATCLAW_MASTER_KEY=${CURLYCATCLAW_MASTER_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curlycatclaw", "--health-check"]
      interval: 10s
      timeout: 5s
      retries: 3

  curlycatclaw-updater:
    image: ghcr.io/jialuohu/curlycatclaw-updater:latest
    restart: unless-stopped
    profiles: ["updater"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.curlycatclaw:/data
      - .:/compose-project:ro
    working_dir: /compose-project
    environment:
      - HOME=${HOME}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-curlycatclaw}
      - SERVICE_NAME=curlycatclaw
      - HEALTH_URL=http://curlycatclaw:18080/health
      - UPDATER_SECRET=${UPDATER_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.17.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 3s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["ollama"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  qdrant-data:
  ollama-data:
