services:
  curlycatclaw:
    build: .
    restart: unless-stopped
    volumes:
      - ~/.curlycatclaw:/data
    env_file:
      - path: ~/.curlycatclaw/env
        required: false
    environment:
      - HOME=/data
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  curlycatclaw-updater:
    build:
      context: .
      dockerfile: Dockerfile.updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.curlycatclaw:/data
      - .:/compose-project:ro
    env_file:
      - path: ~/.curlycatclaw/env
        required: false
    environment:
      - HOME=${HOME}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-curlycatclaw}
      - SERVICE_NAME=curlycatclaw
      - HEALTH_URL=http://curlycatclaw:8080/health
      - UPDATER_SECRET=${UPDATER_SECRET:-}
      - BUILD_MODE=true
    working_dir: /compose-project
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.17.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 3s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  qdrant-data:
  ollama-data:
