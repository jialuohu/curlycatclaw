services:
  curlycatclaw:
    build: .
    restart: unless-stopped
    volumes:
      - curlycatclaw-data:/data
      - ~/.curlycatclaw/config.docker.toml:/data/config.toml:ro
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.14.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  curlycatclaw-data:
  qdrant-data:
